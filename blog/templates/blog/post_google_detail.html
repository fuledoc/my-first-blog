{% extends 'blog/base.html' %}

{% block content %}
    {% for comment in post.searchcomments.all %}
      <div style="border: 3px dotted #000000; height: auto; padding:10px;">
        <table style="width:100%; table-layout: fixed; overflow-wrap: break-word;">
          <tr>
            <th align="left">{{ comment.published_date }} 검색문서 수 {{ comment.searchcommentsdetails.count }}</th>
            <td align="right"><a class="btn btn-default" href="{% url 'google_comment_remove_detail' pk=post.pk ppk=comment.pk %}"><span class="glyphicon glyphicon-remove"></span></a></td>
          </tr>
        </table>
        <!--
        <a class="btn btn-default" href="{% url 'google_add_comment_to_post' pk=post.pk %}">Add comment</a>
        <a class="btn btn-default" href="{% url 'google_add_comment_detail_to_post' pk=post.pk ppk=comment.pk %}">Add comment detail</a>
        -->
        {% for detail in comment.searchcommentsdetails.all %}
          <div class="comment">
            <!-- <div>{{ detail.title }}</div> -->

            <a href="{{ detail.link }}" target="_blank">{{ detail.link|linebreaks }} </a>
            <!-- <p>{{ detail.link|linebreaks }}</p> -->
          </div>
        {% endfor %}
      </div>
      <hr>
    {% endfor %}
{% endblock %}
